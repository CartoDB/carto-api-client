version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
    groups:
      # deck.gl and luma.gl are version-locked, so they must upgrade together in one PR.
      deck-luma-gl:
        patterns:
          - '@deck.gl/*'
          - '@luma.gl/*'
      # loaders.gl packages are version-locked, so they must upgrade together in one PR.
      loaders-gl:
        patterns:
          - '@loaders.gl/*'
      turf:
        patterns:
          - '@turf/*'
      dev-dependencies:
        dependency-type: 'development'
        # These are devDependencies; excluded so they stay in their dedicated groups above.
        exclude-patterns:
          - '@deck.gl/*'
          - '@luma.gl/*'
          - '@loaders.gl/*'
          - '@turf/*'
    ignore:
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      # Pin to TS 5.x. TS 7 is the native (Go) rewrite whose API breaks the build
      # toolchain (tsup + rollup-plugin-dts); TS 6.0 turns the toolchain's baseUrl into a
      # hard error (TS5101). Unpin once the repo is migrated for TS 6/7.
      - dependency-name: "typescript"
        versions: [">= 6.0.0"]
